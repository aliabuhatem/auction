<!DOCTYPE html>
<html lang="nl">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vakantieveilingen Admin Dashboard">
  <meta name="theme-color" content="#E53935">

  <!-- Preconnect to Firebase services — browser opens TCP+TLS sockets
       before Flutter even starts, cutting first-query latency by 200-400ms -->
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
  <link rel="preconnect" href="https://securetoken.googleapis.com">
  <link rel="preconnect" href="https://firebasestorage.googleapis.com">
  <link rel="preconnect" href="https://www.googleapis.com">
  <link rel="dns-prefetch" href="https://firebase.googleapis.com">
  <link rel="dns-prefetch" href="https://fcmregistrations.googleapis.com">

  <!-- Icons -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>Vakantieveilingen Admin</title>
  <link rel="manifest" href="manifest.json">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      /* Exact same background as the admin shell — zero color flash */
      background: #F8F9FC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loading screen ─────────────────────────────────────────────────────── */
    /* Visible the instant the browser parses the HTML — before any JS loads.  */

    #ld {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F8F9FC;
      z-index: 9999;
      transition: opacity 280ms ease;
    }

    #ld.out {
      opacity: 0;
      pointer-events: none;
    }

    /* Logo badge */
    .ld-logo {
      width: 64px;
      height: 64px;
      background: #E53935;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(229, 57, 53, 0.28),
                  0 2px 8px  rgba(229, 57, 53, 0.16);
    }

    .ld-logo svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    .ld-title {
      font-size: 18px;
      font-weight: 700;
      color: #1A1D27;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .ld-sub {
      font-size: 12px;
      color: #8B9CB6;
      font-weight: 500;
      margin-bottom: 36px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* Indeterminate progress bar — pure CSS, zero JS */
    .ld-bar {
      width: 180px;
      height: 3px;
      background: #E8EAF0;
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .ld-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #E53935, transparent);
      animation: ld-sweep 1.4s ease-in-out infinite;
    }

    @keyframes ld-sweep {
      0%   { left: -60%; }
      100% { left: 110%; }
    }
  </style>
</head>
<body>

  <!-- Loading screen — rendered by the browser BEFORE any script executes.
       Zero white-screen time. Matches exact app branding. -->
  <div id="ld" aria-label="Laden…" role="status">
    <div class="ld-logo">
      <!--
        Inline SVG gavel icon — zero network request.
        Visually matches Icons.gavel_rounded in the Flutter app.
      -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.92 5L4.5 7.42l3.08 3.08 2.42-2.42L6.92 5zm10.16
                 0l-3.08 3.08 2.42 2.42 3.08-3.08L17.08
                 5zM4.5 11.5L2 14l1.5 1.5 2.5-2.5L4.5
                 11.5zm15 0-1.5 1.5L20.5 15.5 22 14l-1.5-2.5zM8.5
                 13l-1.5 1.5 9 9 1.5-1.5-9-9z"/>
      </svg>
    </div>
    <div class="ld-title">Vakantieveilingen</div>
    <div class="ld-sub">Admin Panel</div>
    <div class="ld-bar"></div>
  </div>

  <!--
    Dismiss the loading screen the moment Flutter paints its first frame.
    'flutter-first-frame' fires on window as soon as Flutter calls
    SchedulerBinding.instance.scheduleWarmUpFrame() completes.
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var ld = document.getElementById('ld');
      if (!ld) return;
      ld.classList.add('out');
      setTimeout(function () { ld.remove(); }, 320);
    });

    // Register Firebase Messaging service worker for background push on web.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('firebase-messaging-sw.js')
        .then(function (reg) {
          console.log('[SW] FCM service worker registered:', reg.scope);
        })
        .catch(function (err) {
          console.warn('[SW] FCM service worker registration failed:', err);
        });
    }
  </script>

  <script src="flutter_bootstrap.js" defer></script>

</body>
</html>
