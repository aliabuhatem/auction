# pubspec.yaml

name: auction
description: Auction app for holidays and leisure packages
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.5.6

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.3
  connectivity_plus: ^5.0.2

  # Local Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI Components
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  smooth_page_indicator: ^1.1.0

  # Payments
  flutter_stripe: ^9.6.0  # or use Mollie WebView
  webview_flutter: ^4.4.2

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Countdown / Timers
  timer_builder: ^2.0.0

  # QR / Vouchers
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5  # scan QR vouchers

  # Scratch Card
  scratcher: ^2.3.0        # Flutter scratch card package

  # Image / Media
  image_picker: ^1.0.4
  photo_view: ^0.14.0

  # Animations
  flutter_animate: ^4.2.0
  confetti: ^0.7.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Utilities
  dartz: ^0.10.1           # Functional programming (Either type)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.0.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^1.0.1
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.1
