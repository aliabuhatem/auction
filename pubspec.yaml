name: auction
description: Vakantieveilingen — Dutch holiday auction platform
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.0
  firebase_storage: ^13.0.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0

  # Payments — Mollie checkout via WebView
  webview_flutter: ^4.5.0
  # Stripe (future: in-app card capture)
  flutter_stripe: ^11.0.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Countdown / Timers
  timer_builder: ^2.0.0

  # QR / Vouchers
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # Scratch Card
  scratcher: ^2.5.0

  # Image / Media
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # Animations
  flutter_animate: ^4.5.2
  confetti: ^0.7.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Utilities
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  logger: ^2.4.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.2
  package_info_plus: ^8.1.2
  google_sign_in: ^6.2.1
  file_selector: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  json_serializable: ^6.9.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # To enable Nunito:
  #   1. Download from https://fonts.google.com/specimen/Nunito
  #   2. Place the TTF files in assets/fonts/Nunito/
  #   3. Uncomment the block below
  #
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito/Nunito-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Nunito/Nunito-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Nunito/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Nunito/Nunito-ExtraBold.ttf
  #         weight: 800
  #       - asset: assets/fonts/Nunito/Nunito-Black.ttf
  #         weight: 900
