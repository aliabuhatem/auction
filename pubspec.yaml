# pubspec.yaml

name: auction
description: Auction app for holidays and leisure packages
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Navigation
  go_router: ^12.1.1

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # Networking
  dio: ^5.4.0

  connectivity_plus: ^6.1.1

  # Local Storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0

  # Payments
  flutter_stripe: ^11.0.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Countdown / Timers
  timer_builder: ^2.0.0

  # QR / Vouchers
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # Scratch Card
  scratcher: ^2.5.0

  # Image / Media
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # Animations
  flutter_animate: ^4.5.2
  confetti: ^0.7.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Utilities
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.4.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.2
  package_info_plus: ^8.1.2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
